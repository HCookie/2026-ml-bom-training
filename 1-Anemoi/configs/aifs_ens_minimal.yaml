defaults:
- data: zarr
- dataloader: native_grid
- diagnostics: evaluation_ens
- system: pbs
- graph: encoder_decoder_only
- model: transformer_ens
- training: ensemble
- _self_

config_validation: False

# System configuration for ensemble training
system:
  output:
    root: /scratch/${oc.env:PROJECT}/${oc.env:USER}/anemoi-output/
  input:
    graph: null
    dataset: /g/data/dk92/data/aifs-ens/aifs-ea-an-oper-0001-mars-o48-2010-2022-6h-v1-toy.zarr
  hardware: # NOTE: If using more GPUS, this will need to be updated
    accelerator: auto
    num_gpus_per_ensemble: 1 # Number of GPU's used across the total of the members
    num_gpus_per_model: 1 # GPUS per individual member of the ensemble

# Data configuration
data:
  resolution: o48
  timestep: 6h

# Dataloader configuration
dataloader:
  training:
    datasets:
      data:
        dataset_config:
          # Limit parameters for quick training
          dataset: ${dataloader.dataset}
          # ACTIVITY: Explore what is available in the dataset, and alter this selection as desired
          select:  ['z_1000', 'z_500', 'z_700', 'z_300', '2t', 't_850', 'tcw', 'z_250', 'lsm', 'z', 'cp', 'tp', 'cos_latitude', 'cos_longitude', 'sin_latitude', 'sin_longitude', 'cos_julian_day', 'cos_local_time', 'sin_julian_day', 'sin_local_time', 'insolation', 'lsm', 'sdor', 'slor', 'z']
        start: null
        end: 2020
  
  validation:
    datasets:
      data:
        dataset_config: ${dataloader.training.datasets.data.dataset_config}
        start: 2021
        end: 2021

  batch_size: # Set to 1 to keep memory requirements low
    training: 1
    validation: 1
  limit_batches:
    training: null
    validation: 100

# Model configuration for ensemble training
model:
  # ACTIVITY: This is the hidden dimension of the model, and is a key determinant of model capacity. You can increase this for better performance, but it will increase VRAM usage and decrease speed.
  num_channels: 128
  condition_on_residual: False

  # ACTIVITY: Explore what other models can be applied
  model:
    _target_: anemoi.models.models.AnemoiEnsModelEncProcDec

  # Noise injector
  noise_injector:
    _target_: anemoi.models.layers.ensemble.NoiseConditioning
    noise_std: 1
    noise_channels_dim: 4
    noise_mlp_hidden_dim: 32
    layer_kernels:
      Activation:
        _target_: torch.nn.GELU

  # DUE TO V100 CUDA ISSUES, USE PYTORCH-GEOMETRIC
  encoder:
    graph_attention_backend: 'pyg'
  decoder:
    graph_attention_backend: 'pyg'

  # Processor with conditional layer norm
  processor:
    # ACTIVITY: The processor is the core of the model, and is where most architectural changes would be made. You can swap out the TransformerProcessor for a GraphTransformerProcessor for example, or alter the number of layers, attention implementation, etc.
    # ACTIVITY: The processor is the core of the model, and is where most architectural changes would be made. You can swap out the TransformerProcessor for a GraphTransformerProcessor for example, or alter the number of layers, attention implementation, etc.
    num_layers: 8
    attention_implementation: scaled_dot_product_attention
    num_chunks: 4
    mlp_hidden_ratio: 4 # GraphTransformer or Transformer only
    num_heads: 16 # GraphTransformer or Transformer only
    window_size: 512

    layer_kernels:
      LayerNorm:
        _target_: anemoi.models.layers.normalization.ConditionalLayerNorm
        normalized_shape: ${model.num_channels}
        condition_shape: ${model.noise_injector.noise_channels_dim}
        autocast: false

# Training configuration for ensemble CRPS training
training:
  # select model task
  model_task: anemoi.training.train.tasks.GraphEnsForecaster
  ensemble_size_per_device: 2

  training_loss:
    datasets:
      # ACTIVITY: Explore available losses, and ways to configure them
      data: # user-defined key in data
        # loss class to initialise, can be anything subclassing torch.nn.Module
        # To train without multiscale loss, set it to the desired loss directly
        _target_: anemoi.training.losses.MultiscaleLossWrapper
        loss_matrices_path: ${system.input.loss_matrices_path}
        loss_matrices: [null]
        weights: [1.0]

        keep_batch_sharded: ${model.keep_batch_sharded}

        per_scale_loss:
          _target_: anemoi.training.losses.kcrps.AlmostFairKernelCRPS
          scalers: ['pressure_level', 'general_variable', 'nan_mask_weights', 'node_weights', 'time_steps']

          # Scalers to include in loss calculation
          # A selection of available scalers are listed in training/scalers.
          # '*' is a valid entry to use all `scalers` given, if a scaler is to be excluded
          # add `!scaler_name`, i.e. ['*', '!scaler_1'], and `scaler_1` will not be added.
          # scalers: ['pressure_level', 'general_variable', 'nan_mask_weights', 'node_weights']
          ignore_nans: False
          no_autocast: True
          alpha: 0.95


  # Fair CRPS validation metrics
  validation_metrics:
    datasets:
      data: # user-defined key in data
        fkcrps:
          _target_: anemoi.training.losses.kcrps.AlmostFairKernelCRPS
          scalers: ['node_weights', 'time_steps']
          ignore_nans: False
          alpha: 1.0

        multiscale:
          _target_: anemoi.training.losses.MultiscaleLossWrapper

          loss_matrices_path: ${system.input.loss_matrices_path}
          loss_matrices: [null]
          weights: [1.0]

          keep_batch_sharded: ${model.keep_batch_sharded}

          per_scale_loss:
            _target_: anemoi.training.losses.kcrps.AlmostFairKernelCRPS
            scalers: ['node_weights', 'time_steps']

            # Scalers to include in loss calculation
            # A selection of available scalers are listed in training/scalers.
            # '*' is a valid entry to use all `scalers` given, if a scaler is to be excluded
            # add `!scaler_name`, i.e. ['*', '!scaler_1'], and `scaler_1` will not be added.
            # scalers: ['pressure_level', 'general_variable', 'nan_mask_weights', 'node_weights']
            ignore_nans: False
            no_autocast: True
            alpha: 1.0

  # select strategy
  strategy:
    _target_: anemoi.training.distributed.strategy.DDPEnsGroupStrategy
    num_gpus_per_ensemble: ${system.hardware.num_gpus_per_ensemble}
    num_gpus_per_model: ${system.hardware.num_gpus_per_model}
    read_group_size: ${dataloader.read_group_size}

  # Training parameters
  # ACTIVITY: Extend to properly train the model
  # max_steps: 1600  # Short run for demo
  max_epochs: null
  lr:
    rate: 1e-3  # effective_lr=1e-3, effective_bs=16
    warmup: 1000
    iterations: ${training.max_steps}
    min: 3e-7

# Diagnostics configuration
diagnostics:
  callbacks: []
  plot:
    callbacks: []
  log:
    mlflow:
      system: True
      enabled: True
      offline: True
      tracking_uri: file://${system.output.logs.mlflow}
      experiment_name: ${oc.env:USER}-ens-training

